<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/layout.css">
    <link rel="stylesheet" href="./style/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <title>Document</title>
</head>

<body>
    <header class="header">
        <h1 id="title-header">USUARIO</h1>
        <button id="logoutBtn" class="btn logout">Cerrar sesión</button>
    </header>

    <div class="container">
        <div class="card" id="profileSection">
            <h2>Perfil</h2>
            <p><strong>Nombre:</strong> <span id="name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Rol:</strong> <span id="role" class="badge"></span></p>
        </div>

        <div class="card" id="adminSection" style="display:none;">
            <h2>Panel Administrador</h2>
            <button id="loadUsersBtn" class="btn">Listar usuarios</button>
            <button id="newUsersBtn" class="btn">Crear Usuario</button>
            <div id="usersList" class="users-list"></div>
            <div id="newUserSection" class="userForm" style="display: none;">
                <form id="newUserForm">
                    <div>
                        <label for="fullName">Nombre:</label>
                        <input type="text" id="fullName" name="full_name" required>
                    </div>

                    <div>
                        <label for="emailUser">Email:</label>
                        <input type="email" id="emailUser" name="email" required>
                    </div>

                    <div>
                        <label for="passwordUser">Password:</label>
                        <input type="password" id="passwordUser" name="password" required>
                    </div>

                    <button id="btnNewUser" type="submit" class="btn">Crear Usuario</button>
                </form>
            </div>

            <div id="editUserSection" class="userForm" style="display:none;">
                <h3 id="editTitle">Editar Usuario</h3>

                <form id="editUserForm">
                    <div>
                        <label for="editFullName">Nombre:</label>
                        <input type="text" id="editFullName" class='item-edit' name="full_name" required>
                    </div>

                    <div>
                        <label for="editState">Estado:</label>
                        <button id="editState" class='item-edit' type="button">ACTIVO</button>
                    </div>

                    <!-- Solo visible para superadmin -->
                    <div id="roleField" style="display:none;">
                        <label for="editRole">Rol:</label>
                        <select id="editRole" name="role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="div-editButton">
                        <button type="button" id="resetPasswordBtn" class="btn">
                            Resetear contraseña
                        </button>
                    </div>
                    <div class="div-editButton">
                        <button id="btnEdit-save" type="submit" class="btn">Guardar</button>
                        <button id="btnEdit-cancel" type="submit" class="btn">Cancelar</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>

</html>
